services:
  dashboard:
    build: 
      context: ./live-telemetry-dashboard
      dockerfile: Dockerfile
    container_name: live-telemetry-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: server
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    